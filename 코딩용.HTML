<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>복권 번호 뽑기</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #ffecd2, #fcb69f);
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: #333;
    }
    .container {
      width: min(540px, 90%);
      background: #ffffffcc;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.12);
      padding: 32px;
      text-align: center;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 4vw, 3rem);
      color: #d25d5d;
    }
    p {
      margin: 0 0 24px;
      font-size: 1rem;
      line-height: 1.6;
      color: #575757;
    }
    .numbers {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin: 24px 0 8px;
    }
    .ball {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-weight: 700;
      color: #fff;
      font-size: 1.2rem;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      background: linear-gradient(180deg, #ff8a65, #d84315);
    }
    .ball:nth-child(2) { background: linear-gradient(180deg, #ffca28, #f57f17); color: #222; }
    .ball:nth-child(3) { background: linear-gradient(180deg, #4fc3f7, #0288d1); }
    .ball:nth-child(4) { background: linear-gradient(180deg, #81c784, #388e3c); }
    .ball:nth-child(5) { background: linear-gradient(180deg, #b39ddb, #6a1b9a); }
    .ball:nth-child(6) { background: linear-gradient(180deg, #90a4ae, #455a64); }
    button {
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #d84315, #ff8a65);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 28px rgba(216, 67, 21, 0.25);
    }
    .footer {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #777;
    }
    .contact-section {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid #f0d8d8;
      text-align: left;
    }
    .contact-section h2 {
      margin: 0 0 8px;
      font-size: 1.3rem;
      color: #c85a5a;
    }
    .contact-section p {
      margin: 0 0 16px;
      font-size: 0.95rem;
    }
    .form-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.95rem;
      color: #444;
    }
    .field.full {
      margin-top: 14px;
    }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #e7c9c9;
      border-radius: 12px;
      font: inherit;
      background: #fff;
      color: #333;
    }
    .field textarea {
      resize: vertical;
      min-height: 110px;
    }
    .submit-button {
      margin-top: 16px;
      width: 100%;
    }
    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>복권 번호 뽑기</h1>
    <p>아래 버튼을 눌러 1부터 45까지의 숫자 중에서 중복 없는 6개의 복권 번호를 생성하세요.</p>
    <div class="numbers" id="numberList">
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
    </div>
    <button id="generateBtn">번호 뽑기</button>
    <div class="footer">새로 고침 없이 여러 번 다시 뽑을 수 있습니다.</div>

    <section class="contact-section">
      <h2>제휴 문의</h2>
      <p>브랜드 제휴, 협업 제안, 광고 문의 등을 남겨주세요. 빠르게 확인해 드리겠습니다.</p>
      <form action="https://formspree.io/f/xqevqelq" method="POST">
        <div class="form-grid">
          <label class="field">
            <span>이름</span>
            <input type="text" name="name" placeholder="홍길동" required />
          </label>
          <label class="field">
            <span>회사/브랜드명</span>
            <input type="text" name="company" placeholder="예: ABC Corp" />
          </label>
          <label class="field">
            <span>이메일</span>
            <input type="email" name="email" placeholder="name@example.com" required />
          </label>
          <label class="field">
            <span>문의 종류</span>
            <select name="inquiry_type">
              <option value="partnership">제휴 문의</option>
              <option value="sponsorship">후원/광고 문의</option>
              <option value="etc">기타</option>
            </select>
          </label>
        </div>
        <label class="field full">
          <span>문의 내용</span>
          <textarea name="message" rows="5" placeholder="원하시는 제휴 내용을 자세히 적어주세요." required></textarea>
        </label>
        <button class="submit-button" type="submit">문의 보내기</button>
      </form>
    </section>
  </div>

  <script>
    const generateBtn = document.getElementById("generateBtn");
    const numberList = document.getElementById("numberList");

    function getRandomNumbers() {
      const candidates = Array.from({ length: 45 }, (_, i) => i + 1);
      const result = [];

      while (result.length < 6) {
        const index = Math.floor(Math.random() * candidates.length);
        result.push(candidates.splice(index, 1)[0]);
      }

      return result.sort((a, b) => a - b);
    }

    function renderNumbers(numbers) {
      numberList.innerHTML = numbers
        .map(num => `<div class="ball">${num}</div>`)
        .join("");
    }

    generateBtn.addEventListener("click", () => {
      const numbers = getRandomNumbers();
      renderNumbers(numbers);
    });
  </script>
</body>
</html>
